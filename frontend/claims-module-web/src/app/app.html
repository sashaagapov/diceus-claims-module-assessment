<div class="app-shell">
  <mat-toolbar class="app-toolbar">
    <a class="brand-link" routerLink="/" aria-label="Claims Module home">
      <mat-icon aria-hidden="true">assignment</mat-icon>
      <span class="app-title">Claims Module</span>
    </a>

    <nav class="app-nav" aria-label="Primary navigation">
      <a mat-button routerLink="/claims" routerLinkActive="active-link">Claims</a>
      <a mat-button routerLink="/claims/new" routerLinkActive="active-link">New Claim</a>
    </nav>

    <span class="toolbar-spacer"></span>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="user-selector">
      <mat-label>Mock user</mat-label>
      <mat-select [value]="authContext.activeUser().id" (selectionChange)="setActiveUser($event)">
        @for (user of authContext.users; track user.id) {
          <mat-option [value]="user.id">{{ user.displayName }} · {{ user.role }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-toolbar>

  <main class="app-content">
    <router-outlet />
  </main>
</div>
