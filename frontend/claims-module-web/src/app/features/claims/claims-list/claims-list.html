<section class="claims-list">
  <header class="page-header">
    <div>
      <h1>Claims</h1>
      <p>Open and recent claims from the backend database.</p>
    </div>
  </header>

  <mat-card appearance="outlined" class="claims-card">
    @if (isLoading()) {
      <div class="loading-state" aria-live="polite">
        <mat-spinner diameter="36" />
        <span>Loading claims...</span>
      </div>
    } @else if (claims().length === 0) {
      <div class="empty-state">
        <mat-icon aria-hidden="true">inbox</mat-icon>
        <p>No claims found.</p>
      </div>
    } @else {
      <div class="table-wrap">
        <table mat-table [dataSource]="claims()" class="claims-table">
          <ng-container matColumnDef="claimNumber">
            <th mat-header-cell *matHeaderCellDef>Claim Number</th>
            <td mat-cell *matCellDef="let claim">{{ claim.claimNumber }}</td>
          </ng-container>

          <ng-container matColumnDef="lossDate">
            <th mat-header-cell *matHeaderCellDef>Loss Date</th>
            <td mat-cell *matCellDef="let claim">{{ claim.lossDate | date: 'mediumDate' }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let claim">
              <span class="status-pill">{{ claim.status }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let claim">
              <a mat-button [routerLink]="['/claims', claim.claimId]">View</a>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    }
  </mat-card>
</section>
